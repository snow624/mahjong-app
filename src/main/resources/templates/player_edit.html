<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<!-- reset css -->
<link rel="stylesheet"
	href="https://unpkg.com/destyle.css@1.0.5/destyle.css" />
<!-- css -->
<link rel="stylesheet" href="/css/style.css">
<!-- ファビコン -->
<link rel="icon" href="/img/favicon.ico" sizes="any" />
<!-- fontawesome -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

<title>選手編集</title>

</head>
<body>
	<main class="page-container">
		<h1>選手編集</h1>

		<section class="form-card">
			<form th:action="@{'/players/' + ${player.id} + '/edit'}"
				method="post" enctype="multipart/form-data">

				<div class="edit-icon-preview">
					<img
						th:src="${player.iconPath != null ? player.iconPath : '/images/default.png'}">
				</div>

				<div class="form-group">
					<label>名前</label> <input type="text" name="name"
						th:value="${player.name}">
				</div>

				<div class="form-group">
					<label>アイコン画像</label> <input type="file" name="iconFile"
						accept="image/*">
				</div>

				<button type="submit" class="primary-button">保存する</button>
			</form>
		</section>
	</main>

	<div th:replace="~{fragments/nav :: bottomNav}"></div>

</body>

</html>
