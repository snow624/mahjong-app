<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://unpkg.com/destyle.css@1.0.5/destyle.css" />
	<link rel="stylesheet" href="/css/style.css?v=5">
	<link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

	<title>管理者ページ</title>
</head>

<body>
	<main class="page-container">

		<div class="top-title">
			<h1>ADMIN</h1>
			<h3>管理者ページ</h3>
		</div>

		<p th:if="${error}" class="error-message admin-error" th:text="${error}"></p>

		<section class="admin-status-card">
			<h2>現在の状態</h2>

			<div class="admin-status-grid">
				<div class="admin-status-item">
					<div class="admin-status-label">登録プレイヤー</div>
					<div class="admin-status-value">
						<span th:text="${playerCount}"></span><small>人</small>
					</div>
				</div>

				<div class="admin-status-item">
					<div class="admin-status-label">現在の試合枠</div>
					<div class="admin-status-value">
						<span th:text="${matchCount}"></span><small>試合</small>
					</div>
				</div>

				<div class="admin-status-item">
					<div class="admin-status-label">目標試合数</div>
					<div class="admin-status-value">
						<span th:text="${requiredMatchCount}"></span><small>試合</small>
					</div>
				</div>

				<div class="admin-status-item">
					<div class="admin-status-label">1人あたり</div>
					<div class="admin-status-value">
						<span th:text="${targetGamesPerPlayer}"></span><small>試合</small>
					</div>
				</div>
			</div>
		</section>

		<section class="admin-action-card">
			<h2>試合管理</h2>

			<form action="/matches/init" method="post">
				<button class="admin-action-button primary" type="submit">
					<i class="fa-solid fa-plus"></i>
					<span>試合枠を自動作成</span>
				</button>
			</form>

			<form action="/matches/generate" method="post">
				<button class="admin-action-button primary" type="submit">
					<i class="fa-solid fa-shuffle"></i>
					<span>対戦表作成</span>
				</button>
			</form>

			<form action="/matches/clear" method="post">
				<button class="admin-action-button danger" type="submit"
					onclick="return confirm('対戦表と点数を削除します。よろしいですか？');">
					<i class="fa-solid fa-rotate-left"></i>
					<span>対戦表削除</span>
				</button>
			</form>

			<form action="/matches/clear-all" method="post">
				<button class="admin-action-button danger" type="submit"
					onclick="return confirm('試合枠も含めてすべて削除します。よろしいですか？');">
					<i class="fa-solid fa-trash"></i>
					<span>試合枠も全部削除</span>
				</button>
			</form>
		</section>

		<a href="/matches" class="primary-link-button admin-back-button">
			試合一覧へ戻る
		</a>

	</main>

	<div th:replace="~{fragments/nav :: bottomNav}"></div>
</body>

</html>
