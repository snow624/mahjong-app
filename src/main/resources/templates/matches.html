<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- reset css -->
	<link rel="stylesheet" href="https://unpkg.com/destyle.css@1.0.5/destyle.css" />
	<!-- css -->
	<link rel="stylesheet" href="/css/style.css">
	<!-- ファビコン -->
	<link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
	<!-- fontawesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />


	<title>試合一覧</title>
</head>

<body>
	<main class="page-container">

		<div class="top-title">
			<h1>MATCHES</h1>
			<h3>試合一覧</h3>
		</div>

		<!-- プレイヤー選択フォーム -->
		<form method="get" class="player-filter-form">
			<div class="player-filter-header">
				<h4>参加メンバーで絞り込み</h4>
			</div>

			<div class="player-filter-grid">
				<div th:each="p : ${allPlayers}" class="player-filter-item">
					<input type="checkbox" 
						th:id="${'player-' + p.id}" 
						name="playerIds" 
						th:value="${p.id}"
						th:checked="${selectedPlayerIds.contains(p.id)}">
					<label th:for="${'player-' + p.id}">
						<img class="filter-player-icon" 
							th:src="${p.iconPath != null ? p.iconPath : '/images/default.png'}"
							th:alt="${p.name}">
						<span th:text="${p.name.length() > 4 ? p.name.substring(0, 4) : p.name}" th:title="${p.name}"></span>
					</label>
				</div>
			</div>

			<div class="player-filter-actions">
				<button type="submit" class="filter-button">絞り込み</button>
				<a href="/matches" class="filter-reset-button">リセット</a>
			</div>
		</form>

		<section th:each="m : ${matches}" class="match-card">
			<a th:href="@{'/matches/' + ${m.id}}" class="match-link">
				<div class="match-title" th:classappend="${resultMap[m.id] != null && #lists.size(resultMap[m.id]) > 0} ? ' is-completed'"
					th:text="'第' + ${m.matchNumber} + '回戦'">
				</div>
			</a>

			<div th:each="mp : ${playerMap[m.id]}" class="match-player-row">
				<div class="match-player-rank">
					<span th:if="${resultMap[m.id] == null || #lists.size(resultMap[m.id]) == 0}">-</span>
					<span th:each="r : ${resultMap[m.id]}" th:if="${r.player.id == mp.player.id}"
						th:text="${r.rankOrder}"></span>
				</div>

				<img class="match-player-icon"
					th:src="${mp.player.iconPath != null ? mp.player.iconPath : '/images/default.png'}">

				<div>
					<div class="match-player-name" th:text="${mp.player.name}"></div>

					<div th:each="r : ${resultMap[m.id]}" th:if="${r.player.id == mp.player.id}"
						class="match-player-result">

						<div class="match-player-score" th:text="${r.score} + '点'">
						</div>

						<div class="match-player-point" th:text="${#numbers.formatDecimal(r.point, '0.0')} + 'pt'">
						</div>
					</div>
				</div>
			</div>
		</section>

		<!-- 管理者ページへの入口 -->
		<div class="match-action-area">
			<a href="/matches/admin" class="primary-link-button">
				<i class="fa-solid fa-lock"></i> 管理者ページ
			</a>
		</div>

	</main>

	<div th:replace="~{fragments/nav :: bottomNav}"></div>
</body>

</html>
